<!DOCTYPE html>
<html>
<head>
    <title>Fetch API Assignment</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
            margin-top: 40px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        button:hover {
            background-color: #1e7e34;
        }

        .card {
            margin: 30px auto;
            padding: 20px;
            width: 320px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        img {
            border-radius: 50%;
            margin-top: 10px;
        }
    </style>

</head>
<body>

<h2>Fetch API Assignment</h2>

<p>👉 Open Console to see Employee Data</p>

<button onclick="getUser()">Get Random User</button>

<div class="card">
    <h3 id="name">Name: ---</h3>
    <p id="email">Email: ---</p>
    <img id="image" src="" alt="User Image" width="150">
</div>

<script>
    // -------------------------------
    // PART 1: Fetch Employee Data
    // -------------------------------
    fetch("https://dummy.restapiexample.com/api/v1/employees")
        .then(response => response.json())
        .then(data => {
            console.log("Employee Data:");
            console.log(data);
        })
        .catch(error => {
            console.error("Error fetching employee data:", error);
        });

    // -------------------------------
    // PART 2: Random User on Button Click
    // -------------------------------
    function getUser() {
        fetch("https://randomuser.me/api/")
            .then(response => response.json())
            .then(data => {

                let user = data.results[0];

                let fullName = user.name.first + " " + user.name.last;
                let email = user.email;
                let image = user.picture.large;

                document.getElementById("name").innerText = "Name: " + fullName;
                document.getElementById("email").innerText = "Email: " + email;
                document.getElementById("image").src = image;
            })
            .catch(error => {
                console.error("Error fetching user:", error);
            });
    }
</script>

</body>
</html>
