<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            padding: 15px;
        }

        /* Flexbox layout */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Student Card */
        .student-card {
            width: 300px;
            text-align: center;
            border-radius: 10px;
        }

        /* Hide timetable initially (IMPORTANT) */
        #timetable {
            display: none;
        }

        /* Hover effect */
        table tr:hover {
            background-color: #f2f2f2;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .student-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark d-flex justify-content-between">
        <h3 class="text-white">Student Portal</h3>
        <button class="btn btn-primary" onclick="toggleTimeTable()" id="btn">
            TimeTable
        </button>
    </nav>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Student Details -->
        <div class="card student-card shadow p-3 mb-4">
            <!-- Replace with your local image if needed -->
            <img src="image.png" class="rounded-circle mx-auto" alt="Student" height="100">
            <h4 class="mt-2">Akash</h4>
            <p>Class: 10th</p>
            <p>ID: 12345</p>
        </div>

        <!-- Time Table -->
        <div id="timetable" class="container">
            <h2 class="text-center mb-3">Time Table</h2>

            <table class="table table-bordered text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Day</th>
                        <th>9-10</th>
                        <th>10-11</th>
                        <th>11-12</th>
                        <th>1-2</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Monday</td>
                        <td>Math</td>
                        <td>English</td>
                        <td>Science</td>
                        <td>Computer</td>
                    </tr>

                    <tr>
                        <td>Tuesday</td>
                        <td>Science</td>
                        <td>Math</td>
                        <td>PT</td>
                        <td>English</td>
                    </tr>

                    <tr>
                        <td>Wednesday</td>
                        <td>Computer</td>
                        <td>Science</td>
                        <td>Math</td>
                        <td>Library</td>
                    </tr>

                    <tr>
                        <td>Thursday</td>
                        <td>English</td>
                        <td>Math</td>
                        <td>Science</td>
                        <td>PT</td>
                    </tr>

                    <tr>
                        <td>Friday</td>
                        <td>Math</td>
                        <td>Computer</td>
                        <td>English</td>
                        <td>Sports</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- JavaScript -->
    <script>
        function toggleTimeTable() {
            let table = document.getElementById("timetable");
            let btn = document.getElementById("btn");

            if (table.style.display === "none" || table.style.display === "") {
                table.style.display = "block";
                btn.innerText = "Hide TimeTable";
            } else {
                table.style.display = "none";
                btn.innerText = "TimeTable";
            }
        }
    </script>

</body>
</html>
